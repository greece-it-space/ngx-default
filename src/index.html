<!doctype html>
<html lang="el">
	<head>
		<meta charset="utf-8" />
		<title>Greece IT Space</title>
		<base href="/" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<script>
			try {
				const storedMode = localStorage.getItem('app-mode');
				const preferredMode =
					storedMode === 'dark' || storedMode === 'light'
						? storedMode
						: window.matchMedia('(prefers-color-scheme: dark)').matches
							? 'dark'
							: 'light';
				document.documentElement.setAttribute('data-mode', preferredMode);
			} catch {}
		</script>

		<meta
			name="description"
			content="Greece IT Space - ανάπτυξη web και mobile εφαρμογών, IT εκπαίδευση, πρακτική άσκηση και ψηφιακές λύσεις για επιχειρήσεις στην Ελλάδα και πέρα από αυτή."
		/>
		<meta name="author" content="Ομάδα Greece IT Space" />
		<meta name="robots" content="index, follow" />
		<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#061526" media="(prefers-color-scheme: dark)" />

		<meta itemprop="name" content="Greece IT Space" />
		<meta
			itemprop="description"
			content="Ανάπτυξη web και mobile εφαρμογών, IT εκπαίδευση, πρακτική άσκηση και ψηφιακά προϊόντα από το Greece IT Space."
		/>
		<meta itemprop="image" content="https://ngx.greeceit.space/logo.png" />
